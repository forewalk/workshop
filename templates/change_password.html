{% extends "layout.html" %}

{% block content %}
<div class="card">
    <div class="card-header bg-warning">
        <h2 class="mb-0">비밀번호 변경</h2>
    </div>
    <div class="card-body">
        <div class="alert alert-info">
            <i class="fas fa-info-circle"></i> 첫 로그인 시에는 반드시 비밀번호를 변경해야 합니다.
        </div>
        <form id="changePasswordForm">
            <div class="mb-3">
                <label for="current_password" class="form-label">현재 비밀번호</label>
                <input type="password" class="form-control" id="current_password" name="current_password" required>
            </div>
            <div class="mb-3">
                <label for="new_password" class="form-label">새 비밀번호</label>
                <input type="password" class="form-control" id="new_password" name="new_password" required>
            </div>
            <div class="mb-3">
                <button type="submit" class="btn btn-primary">비밀번호 변경</button>
                <a href="/logout" class="btn btn-secondary">로그아웃</a>
            </div>
            <div id="errorDiv" class="alert alert-danger d-none">
                <span id="errorMessage"></span>
            </div>
        </form>
    </div>
</div>

<script>
document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    try {
        const response = await fetch('/change-password', {
            method: 'POST',
            body: formData
        });
        const data = await response.json();
        if (response.ok) {
            alert('비밀번호가 변경되었습니다.');
            window.location.href = '/';
        } else {
            alert(data.detail);
        }
    } catch (error) {
        alert('오류가 발생했습니다: ' + error.message);
    }
});
</script>
{% endblock %}
