{% extends "layout.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-warning text-dark">
                    <h3 class="mb-0 text-center">
                        <i class="fas fa-shield-alt"></i> 관리자 로그인
                    </h3>
                </div>
                <div class="card-body">
                    <div id="loginError" class="alert alert-danger d-none">
                        <i class="fas fa-exclamation-circle"></i> <span id="errorMessage"></span>
                    </div>
                    <form id="adminLoginForm">
                        <div class="mb-3">
                            <label for="password" class="form-label">관리자 비밀번호</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        <button type="submit" class="btn btn-warning w-100">
                            <i class="fas fa-sign-in-alt"></i> 로그인
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const errorDiv = document.getElementById('loginError');
    const errorMessage = document.getElementById('errorMessage');
    
    try {
        const response = await fetch('/admin-login', {
            method: 'POST',
            body: formData
        });
        const data = await response.json();
        
        if (response.ok) {
            errorDiv.classList.add('d-none');
            window.location.reload();
        } else {
            errorDiv.classList.remove('d-none');
            errorMessage.textContent = data.detail || '로그인에 실패했습니다.';
        }
    } catch (error) {
        errorDiv.classList.remove('d-none');
        errorMessage.textContent = '로그인 처리 중 오류가 발생했습니다.';
    }
});
</script>
{% endblock %}
